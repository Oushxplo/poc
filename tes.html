<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>POC Login</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #0f172a;
            font-family: Arial, sans-serif;
        }

        .container {
            background: #1e293b;
            padding: 30px;
            border-radius: 10px;
            width: 320px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            text-align: center;
        }

        h1 {
            color: white;
            margin-bottom: 20px;
            letter-spacing: 5px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border-radius: 5px;
            border: none;
            outline: none;
        }

        button {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            border-radius: 5px;
            border: none;
            background: #3b82f6;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            background: #2563eb;
        }

        .footer {
            margin-top: 15px;
            font-size: 12px;
            color: #94a3b8;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>POC</h1>
        
        <form onsubmit="return fakeLogin()">
            <input type="text" placeholder="Username" required>
            <input type="password" placeholder="Password" required>
            <button type="submit">Login</button>
        </form>

        <div class="footer">
            Proof of Concept - Demo Interface
        </div>
    </div>

    <script>
        function fakeLogin() {
            alert("Ini hanya tampilan POC (demo).");
            return false;
        }
    </script>

</body>
</html>
